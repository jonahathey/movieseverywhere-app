<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies Everywhere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="spinner-border" role="status"><span class="visually-hidden">Loading…</span></div>
    <p>Loading your library…</p>
  </div>

  <!-- ===== GLASS HEADER (all sizes) ===== -->
  <header class="me-header" id="meHeader">
    <img class="me-logo" src="assets/logos/movieseverywhere-color.png" alt="Movies Everywhere">
    <div class="me-active-filter" id="activeFilterPill">
      <span id="activeFilterLabel">All Movies</span>
    </div>
    <div class="me-header-right">
      <div class="me-sort-bubble" id="sortBubble">
        <button class="me-sort-btn active" data-sort="date-desc" aria-label="Sort by recent"><i class="bi bi-calendar"></i></button>
        <button class="me-sort-btn" data-sort="alpha-asc" aria-label="Sort A-Z"><i class="bi bi-sort-alpha-down"></i></button>
        <button class="me-sort-btn" data-sort="rating-desc" aria-label="Sort by rating"><i class="bi bi-hand-thumbs-up"></i></button>
      </div>
    </div>
  </header>

  <!-- ===== FILTER BAR (all sizes) ===== -->
  <div class="me-filter-bar" id="meFilterBar">
    <div class="me-filter-scroll" id="me-filter-chips"></div>
  </div>

  <!-- Navbar (legacy, hidden) -->
  <nav class="navbar navbar-expand-sm navbar-dark sticky-top" style="display:none !important">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎬 Movies Everywhere</a>
      <a href="manage.html" class="btn btn-sm btn-outline-light ms-auto">Manage</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mt-3" id="mainContent">

    <!-- Toolbar (legacy, hidden) -->
    <div class="toolbar" style="display:none !important">
      <input type="search" class="form-control form-control-sm me-3" id="search-box" placeholder="Search titles…" style="max-width:220px;">

      <span class="text-secondary me-2" style="font-size:.85rem;">Sort:</span>
      <span id="sort-buttons" class="d-flex gap-1"></span>

      <span class="text-secondary ms-3 me-2" style="font-size:.85rem;">Filter:</span>
      <div id="filter-chips" class="filter-chips"></div>
    </div>

    <!-- Poster Grid -->
    <div id="poster-grid" class="poster-grid"></div>
  </div>

  <!-- Detail Modal (Desktop) -->
  <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content glass-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="detail-title"></h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-5">
              <img id="detail-poster" class="detail-poster" src="" alt="">
            </div>
            <div class="col-md-7">
              <p class="detail-meta" id="detail-date"></p>
              <div class="detail-stars" id="detail-rating"></div>
              <div class="genre-tags" id="detail-genres"></div>
              <div id="detail-credits"></div>
              <p class="detail-overview" id="detail-overview"></p>
              <div class="format-badges" id="detail-formats"></div>
              <div id="detail-tags"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Full-Screen -->
  <div id="detail-fullscreen" class="detail-fullscreen">
    <div class="fs-header glass-bar">
      <button type="button" class="fs-back-btn" aria-label="Back" onclick="App.closeFullScreen()">
        <i class="bi bi-chevron-left"></i>
      </button>
      <strong id="fs-title"></strong>
      <div class="fs-header-spacer"></div>
    </div>
    <img id="fs-poster" class="fs-poster" src="" alt="">
    <div class="fs-body">
      <p class="detail-meta" id="fs-date"></p>
      <div class="detail-stars" id="fs-rating"></div>
      <div class="genre-tags" id="fs-genres"></div>
      <div id="fs-credits"></div>
      <p class="detail-overview" id="fs-overview"></p>
      <div class="format-badges" id="fs-formats"></div>
      <div id="fs-tags"></div>
    </div>
  </div>

  <!-- ===== SEARCH (liquid glass, all sizes) ===== -->
  <div class="me-search" id="meSearch">
    <div class="me-search-expanded" id="meSearchExpanded">
      <input type="search" id="mobile-search-box" placeholder="Start Typing to Filter" autocomplete="off">
      <button class="me-search-submit" aria-label="Search"><i class="bi bi-search"></i></button>
    </div>
    <button class="me-search-collapsed" id="meSearchCollapsed" aria-label="Search">
      <i class="bi bi-search"></i>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
